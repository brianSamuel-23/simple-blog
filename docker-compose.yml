services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-admin123}
      MYSQL_DATABASE: ${DB_DATABASE:-simple_blog}
      MYSQL_USER: ${DB_USERNAME:-admin}
      MYSQL_PASSWORD: ${DB_PASSWORD:-admin123}
    ports:
      - "${DB_PORT:-13306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-admin123}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./database/migrations:/migrations
    entrypoint:
      [
        "migrate",
        "-path", "/migrations",
        "-database", "mysql://${DB_USERNAME:-admin}:${DB_PASSWORD:-admin123}@tcp(mysql:3306)/${DB_DATABASE:-simple_blog}",
        "up"
      ]

  app:
    build: .
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-simple_blog}
      DB_USERNAME: ${DB_USERNAME:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-admin123}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-development}
      JWT_TTL_MINUTES: ${JWT_TTL_MINUTES:-60}

volumes:
  mysql_data:
