root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/api"
  entrypoint = "./tmp/main"
  include_ext = ["go", "html", "tpl", "tmpl", "env"]
  exclude_dir = ["tmp", "vendor"]
  exclude_regex = ["_test.go"]
  delay = 1000
  stop_on_error = true

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
